
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <title>資訊搜尋頁</title>
    
  <link rel="stylesheet" crossorigin href="/chill-around-project/assets/all-BhUrIgRI.css">
</head>
<body>

    <!-- 導航條 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <a class="navbar-brand" href="#">
          <img src="/chill-around-project/assets/chillAround_logo_01-DR13PjDD.png" alt="Logo" style="height: 80px;">
      </a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav">
              <li class="nav-item">
                  <button class="btn btn-outline-primary mr-2">登入</button>
              </li>
              <li class="nav-item">
                  <button class="btn btn-primary">+</button>
              </li>
          </ul>
      </div>
  </nav>

  <!-- 首頁圖片 -->
  <div id="hero-image" class="container mt-4">
    <div class="row">
        <div class="col-md-4 hero-image">
            <img src="/chill-around-project/assets/chimeiMuseum-DJm8o5hA.jpeg" alt="Image 1">
        </div>
        <div class="col-md-4 hero-image">
            <img src="/chill-around-project/assets/tainan-Cz63pDbC.jpeg" alt="Image 2">
            <div class="search-overlay">
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="輸入搜尋關鍵字">
                    <div class="input-group-append">
                        <button class="btn btn-outline-light" type="button">搜尋</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4 hero-image">
            <img src="/chill-around-project/assets/Taipei_101-B3rzN8Y4.jpg" alt="Image 3">
        </div>
    </div>
</div>
    <!-- 搜尋區域 -->
    <div class="search-overlay">
        <div class="input-group">
            <select class="custom-select mr-2">
                <option selected>選擇選項1</option>
                <option value="1">選項1</option>
                <option value="2">選項2</option>
                <option value="3">選項3</option>
            </select>
            <select class="custom-select mr-2">
                <option selected>選擇選項2</option>
                <option value="1">選項A</option>
                <option value="2">選項B</option>
                <option value="3">選項C</option>
            </select>
            <div class="input-group-append">
                <button class="btn btn-outline-light" type="button">搜尋</button>
            </div>
        </div>
    </div>

    <!-- 圖片展示 -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <img src="image1.jpg" class="img-fluid" alt="描述">
                <h5>標題1</h5>
            </div>
            <div class="col-md-4">
                <img src="image2.jpg" class="img-fluid" alt="描述">
                <h5>標題2</h5>
            </div>
            <!-- 更多圖片區塊 -->
        </div>
    </div>

    <!-- 景點推薦 -->
    <div class="container mt-4">
        <h3>景點推薦</h3>
        <div class="row">
            <div class="col-md-3">
                <img src="景點1.jpg" class="img-fluid" alt="景點1">
                <p>描述文字</p>
            </div>
            <!-- 更多景點 -->
        </div>
    </div>

    <!-- 精選美食 -->
    <div class="container mt-4">
        <h3 class="mt-4">精選美食</h3>
        <div class="row">
            <div class="col-md-3">
                <img src="美食1.jpg" class="img-fluid" alt="美食1">
                <p>描述文字</p>
            </div>
            <!-- 更多美食 -->
        </div>
    </div>

    <!-- 底部版權和社交圖標 -->
    <footer class="text-center mt-4">
        <p>版權資訊</p>
        <a href="#"><img src="icon1.png" alt="社交圖標"></a>
        <!-- 更多社交圖標 -->
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
